    # ------------------------------------------------------------
    # EXPERT SETTINGS
    # ------------------------------------------------------------
    expert_settings:
      name: "Expert Settings"
      description: Advanced automation behavior settings. Only change these if you understand the implications.
      icon: mdi:tune
      collapsed: true
      input:
        mode_select:
          name: Execution Mode
          description: >
            Controls what happens when a new button event fires while the automation is already running.


            🔄 Restart (default) — Stops any running instance and starts fresh. Required when using
            the Dimming Function — this is what stops the dim loop when you release the button (btn_up).
            Best for: setups using dimming on any button.


            ⏸️ Single — Ignores new triggers while the automation is running. Useful if your button
            actions contain delays or multi-step sequences and you want to prevent them being
            interrupted by a second press. WARNING: incompatible with dimming — the dim loop will
            never stop because btn_up will be ignored while the loop is running.


            📋 Queued — New triggers wait in line and run after the current instance finishes.
            Useful if you want every press to be acted on, even rapid ones. WARNING: incompatible
            with dimming for the same reason as Single.


            ⚡ Parallel — Every trigger starts a new independent instance simultaneously. Useful
            if buttons are truly independent and actions are fast fire-and-forget service calls
            with no delays. WARNING: incompatible with dimming — the dim loop will never stop.


            ⚠️ If ANY button has Dimming enabled, you must use Restart.
          default: restart
          selector:
            select:
              options:
                - label: "🔄 Restart — stops running instance; required for dimming (default)"
                  value: restart
                - label: "⏸️ Single — ignores new triggers while running; no dimming"
                  value: single
                - label: "📋 Queued — queues triggers to run in order; no dimming"
                  value: queued
                - label: "⚡ Parallel — each trigger runs independently; no dimming"
                  value: parallel
        debug_enabled:
          name: 🔘 Enable Debug Notifications
          description: Show combined trigger+action notifications for troubleshooting (disable after setup)
          selector:
            boolean: {}
          default: false

mode: !input mode_select
max_exceeded: silent

trigger:
  # Button 1 Triggers
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: single_push
    id: btn1_single
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: double_push
    id: btn1_double
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: triple_push
    id: btn1_triple
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: btn_down
    id: btn1_down
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: btn_up
    id: btn1_up
  - platform: event
    event_type: shelly.click
    event_data:
      device_id: !input shelly_device
      channel: 1
      click_type: long_push
    id: btn1_long
  # Button 2 Triggers
  - platform: event
